name: zcinecontroller
description: "Open-source iOS + Android app to connect to, control, and monitor (live image) Nikon Z cinema-line cameras — primarily the Nikon ZR."
publish_to: 'none'
version: 0.0.1+1

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  file_picker: ^8.0.0
  flutter_inappwebview: ^6.0.0
  archive: ^3.6.0
  path_provider: ^2.1.0
  bonsoir: ^7.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  shaders:
    - shaders/lut3d.frag

# iOS-specific notes (apply after flutter create . --platforms ios):
# - The minimum deployment target is controlled in Xcode (Runner target > General > Deployment Target).
#   We target iOS 13.0+ as a good baseline for modern TCP sockets + Local Network permission.
# - NSLocalNetworkUsageDescription is required for PTP-IP and is already present in ios/Runner/Info.plist.
# - Physical device required (simulator cannot easily join the ZR's WiFi AP or talk PTP-IP to real camera).
# - After setup, open ios/Runner.xcworkspace in Xcode, set your Apple Developer team for signing, then build to device.
