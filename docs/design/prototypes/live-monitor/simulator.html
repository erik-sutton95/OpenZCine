<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Z Cinema Monitor — iPhone 16 Pro Max</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
/* Device simulator harness — frames the live monitor (index.html) inside an
   iPhone 16 Pro Max. The screen iframe is sized to the device's logical
   points (440×956 / 956×440) so the app's own responsive layout reacts
   exactly as it would on hardware. Not product UI.

   Click-through / isolation notes:
   - .island and .btn use pointer-events:none so simulator bezel/notch chrome
     does not intercept pointer events destined for the iframe content (critical
     for Layout Edit drags and tapping HUD near notch-safe zones).
   - Rotate button + caption are positioned:absolute inside .stage (not fixed
     to the outer document). This prevents the simulator UI from appearing
     "on top of everything" in the host preview pane or Open Design chrome. */
:root{
  --titanium-1:#54545a; --titanium-2:#2b2b30; --titanium-3:#3d3d43;
  --sans:'Manrope',-apple-system,system-ui,sans-serif;
  --mono:'JetBrains Mono',ui-monospace,Menlo,monospace;
  --accent:oklch(82% 0.155 83);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  background:radial-gradient(120% 100% at 50% 0%, #15161b 0%, #0a0b0e 55%, #060708 100%);
  font-family:var(--sans); color:#e7e7ea; overflow:hidden;
  -webkit-font-smoothing:antialiased;
}

.stage{position:fixed;inset:0;display:grid;place-items:center}

/* ---- device --------------------------------------------------------- */
.phone{position:relative;transform-origin:center;
  filter:drop-shadow(0 40px 90px rgba(0,0,0,.6));transition:transform .45s cubic-bezier(.4,0,.2,1)}
.frame{position:absolute;inset:0;border-radius:64px;padding:16px;
  background:
    linear-gradient(145deg, var(--titanium-1), var(--titanium-2) 38%, var(--titanium-3) 68%, var(--titanium-1));
  box-shadow:
    inset 0 0 0 1.5px rgba(255,255,255,.10),
    inset 0 0 0 6px #0a0a0c,
    0 1px 2px rgba(255,255,255,.12);}
.screen{position:relative;width:100%;height:100%;border-radius:48px;overflow:hidden;background:#000}
.screen iframe{border:0;display:block;background:#000}

/* Dynamic Island — overlays the screen.
   pointer-events:none so the visual notch/chrome does not block clicks/taps/drags
   into the iframe content underneath (lets you interact with HUD elements that
   sit near the top or left notch-safe zone when using Layout Edit mode). */
.island{position:absolute;background:#000;border-radius:999px;z-index:6;pointer-events:none;
  box-shadow:0 0 0 1px rgba(255,255,255,.04)}
body[data-orient="portrait"] .island{width:126px;height:37px;left:50%;top:30px;transform:translateX(-50%)}
body[data-orient="landscape"] .island{width:37px;height:126px;top:50%;left:30px;transform:translateY(-50%)}

/* side buttons (titanium bars on the rails) — purely visual simulator chrome;
   pointer-events:none prevents any accidental hit-testing overlap with the
   inner screen area under scaling or orientation transforms. */
.btn{position:absolute;background:linear-gradient(90deg,#5b5b61,#34343a);border-radius:3px;z-index:2;pointer-events:none}
body[data-orient="portrait"] .b-action{left:-3px;top:150px;width:4px;height:34px}
body[data-orient="portrait"] .b-volup{left:-3px;top:212px;width:4px;height:66px}
body[data-orient="portrait"] .b-voldn{left:-3px;top:292px;width:4px;height:66px}
body[data-orient="portrait"] .b-power{right:-3px;top:236px;width:4px;height:104px}
body[data-orient="portrait"] .b-cam{right:-3px;top:372px;width:4px;height:54px}
/* landscape: device rotated, rails move to top (was left) / bottom (was right) */
body[data-orient="landscape"] .b-action{top:-3px;left:150px;height:4px;width:34px}
body[data-orient="landscape"] .b-volup{top:-3px;left:212px;height:4px;width:66px}
body[data-orient="landscape"] .b-voldn{top:-3px;left:292px;height:4px;width:66px}
body[data-orient="landscape"] .b-power{bottom:-3px;left:236px;height:4px;width:104px}
body[data-orient="landscape"] .b-cam{bottom:-3px;left:372px;height:4px;width:54px}

/* ---- page chrome ---------------------------------------------------- */
/* Controls are ABSOLUTE (not fixed) and rendered as direct children of .stage
   (the simulator's own inset container). This keeps the rotate + caption
   scoped inside the simulator viewport so they cannot float "on top of
   everything" in the host Open Design UI or preview pane. */
.rotate{position:absolute;top:20px;right:20px;z-index:20;display:inline-flex;align-items:center;gap:8px;
  padding:10px 16px;border-radius:999px;cursor:pointer;
  background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);color:#e7e7ea;
  font-family:var(--sans);font-size:13px;font-weight:600;letter-spacing:.01em;
  -webkit-backdrop-filter:blur(12px);backdrop-filter:blur(12px);transition:background .2s,transform .2s}
.rotate:hover{background:rgba(255,255,255,.11)}
.rotate:active{transform:scale(.95)}
.rotate svg{width:16px;height:16px;color:var(--accent)}
.cap{position:absolute;bottom:18px;left:50%;transform:translateX(-50%);z-index:20;
  font-family:var(--mono);font-size:11px;letter-spacing:.14em;color:rgba(231,231,234,.5);
  text-transform:uppercase;white-space:nowrap}
</style>
</head>
<body data-orient="landscape">
  <div class="stage">
    <div class="phone" id="phone">
      <div class="frame">
        <div class="screen"><iframe id="screen-frame" src="index.html" title="Live monitor" scrolling="no" loading="eager"></iframe></div>
        <div class="island"></div>
      </div>
      <span class="btn b-action"></span>
      <span class="btn b-volup"></span>
      <span class="btn b-voldn"></span>
      <span class="btn b-power"></span>
      <span class="btn b-cam"></span>
    </div>

    <!-- Rotate + caption are INSIDE .stage and absolute-positioned (see CSS).
         This keeps simulator harness controls scoped to the preview area and
         prevents them from stacking on top of the larger Open Design UI. -->
    <button class="rotate" id="rotate" type="button" aria-label="Rotate device">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-3-6.7"/><path d="M21 4v5h-5"/></svg>
      Rotate
    </button>
    <div class="cap" id="cap"></div>
  </div>

<script>
(function(){
  const BEZEL = 16;
  let orient = 'landscape';
  const phone = document.getElementById('phone');
  const frame = document.querySelector('.frame');
  const screen = document.querySelector('.screen');
  const iframe = document.getElementById('screen-frame');
  const cap = document.getElementById('cap');

  function layout(){
    const sw = orient === 'portrait' ? 440 : 956;
    const sh = orient === 'portrait' ? 956 : 440;
    const fw = sw + BEZEL * 2, fh = sh + BEZEL * 2;

    document.body.dataset.orient = orient;
    phone.style.width = fw + 'px';  phone.style.height = fh + 'px';
    screen.style.width = sw + 'px'; screen.style.height = sh + 'px';
    iframe.style.width = sw + 'px'; iframe.style.height = sh + 'px';

    const availW = window.innerWidth - 56;
    const availH = window.innerHeight - 110;
    const s = Math.min(availW / fw, availH / fh, 1.1);
    phone.style.transform = 'scale(' + s + ')';

    cap.textContent = 'iPhone 16 Pro Max · ' +
      (orient === 'portrait' ? 'Portrait' : 'Landscape') + ' · ' + sw + ' × ' + sh + ' pt';
  }

  document.getElementById('rotate').addEventListener('click', () => {
    orient = orient === 'portrait' ? 'landscape' : 'portrait';
    layout();
  });

  let t;
  window.addEventListener('resize', () => { clearTimeout(t); t = setTimeout(layout, 80); });
  layout();
})();
</script>
</body>
</html>
