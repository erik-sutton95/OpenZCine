# gitleaks secret-scan config for OpenZCine.
# Extends the built-in ruleset and allowlists values that are known-safe for
# this repo. See docs/commit-hygiene.md for the policy this enforces.
title = "OpenZCine secret scan"

[extend]
useDefault = true

[allowlist]
description = "Repo-specific known-safe values and paths"
regexes = [
  # Functional PTP-IP pairing friendly-name handed to the camera — not a secret.
  '''WTU-iPhone''',
  # Fixed RFC 4122 UUID used only as an idempotency fixture in the relay test history.
  '''123e4567-e89b-12d3-a456-426614174000''',
]
paths = [
  # This config talks about secret patterns on purpose.
  '''\.gitleaks\.toml$''',
]
