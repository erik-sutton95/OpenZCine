name: Play Internal

# Uploads signed phone + Wear OS bundles to Google Play internal testing tracks.
# Mirrors TestFlight automation: runs on push to main when Android-relevant paths
# change, plus manual dispatch and optional android-v* tags.
# Gated by repository variable PLAY_UPLOAD_ENABLED (must be exactly "true").
# Prerequisites: docs/android-distribution.md
on:
  push:
    branches:
      - main
    tags:
      - "android-v*"
  workflow_dispatch:

permissions:
  contents: read

# Never cancel an in-progress upload; queue instead (mirrors testflight.yml).
concurrency:
  group: play-internal-${{ github.repository }}
  cancel-in-progress: false

env:
  # versionCode = offset + run number, monotonic across uploads. Raise the offset
  # if it ever falls behind the highest versionCode in the Play console.
  ANDROID_VERSION_CODE_OFFSET: "100"

jobs:
  changes:
    name: Detect changes
    # Uploads stay off until the repo variable is explicitly set; the repo-name
    # guard alone would re-arm on rename.
    if: >-
      ${{ github.repository == 'erik-sutton95/openzcine' &&
          vars.PLAY_UPLOAD_ENABLED == 'true' }}
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4
        id: filter
        with:
          # Product paths that affect the Android phone/Wear app. Shared Swift core
          # is included so protocol/UI parity merges also ship to internal testers.
          filters: |
            code:
              - 'Sources/**'
              - 'Tests/**'
              - 'Apps/Android/**'
              - 'Package.swift'
              - '.swift-format'
              - 'scripts/android-*.sh'
              - 'scripts/verify-android-*.sh'
              - 'justfile'
              - '.github/workflows/play-internal.yml'

  play-internal:
    name: Build & upload
    needs: changes
    if: >-
      github.repository == 'erik-sutton95/openzcine' &&
      vars.PLAY_UPLOAD_ENABLED == 'true' &&
      (needs.changes.outputs.code == 'true' ||
        github.event_name == 'workflow_dispatch' ||
        startsWith(github.ref, 'refs/tags/android-v'))
    runs-on: ubuntu-latest
    environment: play
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Validate release ref and version
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
        run: ./scripts/android-play-release-guard.sh

      - uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          distribution: temurin
          java-version: "21"

      # Gradle caching; the runner's preinstalled Android SDK provides platform/build-tools.
      - uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

      # Keep the Play artifact on the exact Swift Android SDK/toolchain that
      # CI uses. Gradle stages the arm64-v8a core into build output itself.
      - name: Set up Swift Android toolchain
        id: swift-android
        uses: skiptools/swift-android-action@2044b79660f201ccef8cbce62877e4ec5409f9c8 # v2.9.5
        with:
          swift-version: '6.3.3'
          ndk-version: '27'
          compile-sdk-api-level: '29'
          build-package: false
          build-tests: false
          run-tests: false

      - name: Run Android checks
        working-directory: Apps/Android
        env:
          SWIFT_ANDROID_SDK_ID: swift-6.3.3-RELEASE_android
        run: ./gradlew test lint

      - name: Compute version code
        id: version
        run: |
          echo "version_code=$(( ANDROID_VERSION_CODE_OFFSET + GITHUB_RUN_NUMBER ))" >> "$GITHUB_OUTPUT"

      - name: Validate release credentials
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          PLAY_SERVICE_ACCOUNT_JSON: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
        run: |
          missing=()
          for name in ANDROID_KEYSTORE_BASE64 ANDROID_KEYSTORE_PASSWORD ANDROID_KEY_ALIAS ANDROID_KEY_PASSWORD PLAY_SERVICE_ACCOUNT_JSON; do
            if [ -z "${!name:-}" ]; then
              missing+=("$name")
            fi
          done
          if (( ${#missing[@]} > 0 )); then
            echo "::error::Missing 'play' environment secrets: ${missing[*]} (docs/android-distribution.md)."
            exit 1
          fi
          if ! jq -e '
            .type == "service_account" and
            (.client_email | type == "string" and length > 0) and
            (.private_key | type == "string" and length > 0)
          ' >/dev/null <<< "$PLAY_SERVICE_ACCOUNT_JSON"; then
            echo "::error::PLAY_SERVICE_ACCOUNT_JSON is not a valid service-account JSON key."
            exit 1
          fi

      - name: Decode and inspect upload keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/upload-keystore.jks"
          keytool -list \
            -keystore "$RUNNER_TEMP/upload-keystore.jks" \
            -storepass "$ANDROID_KEYSTORE_PASSWORD" \
            -alias "$ANDROID_KEY_ALIAS" >/dev/null

      - name: Build and verify signed release packages
        working-directory: Apps/Android
        env:
          ANDROID_KEYSTORE_PATH: ${{ runner.temp }}/upload-keystore.jks
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          VERSION_CODE: ${{ steps.version.outputs.version_code }}
          SWIFT_ANDROID_SDK_ID: swift-6.3.3-RELEASE_android
        run: ./gradlew :app:verifyReleaseNativeLibraries :wear:verifyWearReleaseArtifact "-PversionCode=$VERSION_CODE"

      - name: Verify bundle signatures
        env:
          ANDROID_KEYSTORE_PATH: ${{ runner.temp }}/upload-keystore.jks
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          ./scripts/verify-android-bundle-signing.sh \
            Apps/Android/app/build/outputs/bundle/release/app-release.aab \
            Apps/Android/wear/build/outputs/bundle/release/wear-release.aab

      # r0adkll/upload-google-play over alternatives: Google publishes no official
      # GitHub Action for Play uploads (its official paths are Gradle Play Publisher
      # or the raw Publishing API), and this action is the de-facto standard — most
      # widely used, actively maintained, and a minimal wrapper over the Publishing
      # API, matching how testflight.yml keeps the upload step thin.
      - name: Upload to Play internal track
        uses: r0adkll/upload-google-play@e738b9dd8f2476ea806d921b64aacd24f34515a5 # v1.1.5
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.opencapture.openzcine
          releaseFiles: Apps/Android/app/build/outputs/bundle/release/app-release.aab
          tracks: internal
          status: completed
          whatsNewDirectory: Apps/Android/distribution/whatsnew
          mappingFile: Apps/Android/app/build/outputs/mapping/release/mapping.txt

      - name: Upload to Wear OS internal track
        uses: r0adkll/upload-google-play@e738b9dd8f2476ea806d921b64aacd24f34515a5 # v1.1.5
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.opencapture.openzcine
          releaseFiles: Apps/Android/wear/build/outputs/bundle/release/wear-release.aab
          tracks: wear:internal
          status: completed
          whatsNewDirectory: Apps/Android/distribution/whatsnew
          mappingFile: Apps/Android/wear/build/outputs/mapping/release/mapping.txt

      - name: Summary
        run: |
          {
            echo "### Play internal upload"
            echo ""
            echo "- **Phone version code:** ${{ steps.version.outputs.version_code }}"
            echo "- **Wear version code:** $((1000000000 + ${{ steps.version.outputs.version_code }}))"
            echo "- **Commit:** \`${{ github.sha }}\`"
            echo ""
            echo "<details><summary>What's new</summary>"
            echo ""
            cat Apps/Android/distribution/whatsnew/whatsnew-en-US
            echo ""
            echo "</details>"
          } >> "$GITHUB_STEP_SUMMARY"
