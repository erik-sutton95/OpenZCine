name: Deploy landing page

# Deploys ONLY the public landing page (site/) to GitHub Pages via the
# "GitHub Actions" Pages source. The shared docs/ folder (engineering notes,
# specs, proprietary protocol references) is NEVER uploaded — keeping it private.
on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - "scripts/check-site.sh"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: deploy-pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Configure public beta link
        env:
          TESTFLIGHT_URL: ${{ vars.TESTFLIGHT_URL }}
        run: |
          if [[ ! "$TESTFLIGHT_URL" =~ ^https://testflight\.apple\.com/join/[A-Za-z0-9]+$ ]]; then
            echo "::error::Set the TESTFLIGHT_URL repository variable to the public Apple TestFlight join URL."
            exit 1
          fi
          find site -name '*.html' -exec sed -i "s#TESTFLIGHT_URL#${TESTFLIGHT_URL}#g" {} +

      - name: Verify deploy tree
        run: ./scripts/check-site.sh --deployed

      - name: Setup Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      # Upload ONLY site/ — never the repo's internal docs/ folder.
      - name: Upload artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
