name: CI

on:
  push:
    branches:
      - main
      - "feature/**"
      - "feat/**"
      - "codex/**"
  pull_request:

permissions:
  contents: read
  pull-requests: read # dorny/paths-filter lists changed PR files via the API

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  meta:
    name: Meta checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Repository hygiene
        run: ./scripts/check-repository-hygiene.sh

      - name: Landing-page assets
        run: ./scripts/check-site.sh

      - name: TestFlight notes
        run: |
          ./scripts/ios-release-notes-check.sh
          ./scripts/ios-release-notes-test.sh

      - name: Require reviewed notes for TestFlight-triggering pull requests
        if: ${{ github.event_name == 'pull_request' }}
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          changed_files="$(git diff --name-only "$BASE_SHA"...HEAD)"
          if grep -Eq '^(Sources/|Tests/|ios/|Package\.swift$|scripts/|justfile$)' <<< "$changed_files"; then
            if ! grep -Fxq 'ios/TestFlight/WhatToTest.en-US.txt' <<< "$changed_files"; then
              echo "Update ios/TestFlight/WhatToTest.en-US.txt with plain-language changes and test steps." >&2
              exit 1
            fi
          fi

      - name: Spell check
        uses: crate-ci/typos@bee27e3a4fd1ea2111cf90ab89cd076c870fce14 # v1.48.0

      - name: Markdown lint
        uses: DavidAnson/markdownlint-cli2-action@8de2aa07cae85fd17c0b35642db70cf5495f1d25 # v24.0.0
        with:
          globs: "**/*.md"

      - name: Link check
        uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411 # v2
        with:
          args: "--no-progress --offline --exclude-path vendor --exclude-path ref --exclude-path docs/design --exclude-path site ."
          fail: true

      - name: EditorConfig check
        uses: editorconfig-checker/action-editorconfig-checker@d2ed4fd072ae6f887e9407c909af0f585d2ad9f4 # v2

      - name: Actionlint
        # Digest-pinned for reproducibility. Update the version manually when needed. v1.7.12
        uses: docker://rhysd/actionlint:1.7.12@sha256:b1934ee5f1c509618f2508e6eb47ee0d3520686341fec936f3b79331f9315667
        with:
          args: "-color"

  secrets:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Gitleaks
        # Digest-pinned for reproducibility. Update the version manually when needed. v8.30.1
        uses: docker://ghcr.io/gitleaks/gitleaks:v8.30.1@sha256:c00b6bd0aeb3071cbcb79009cb16a60dd9e0a7c60e2be9ab65d25e6bc8abbb7f
        with:
          args: "detect --source=. --redact --no-banner --config=.gitleaks.toml"

  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
      android: ${{ steps.filter.outputs.android }}
    steps:
      # `dorny/paths-filter` fetches the base ref to diff on push events, which needs the checkout's
      # git credentials — so this job keeps them (unlike the others). It runs no repository code, so
      # the token is never exposed to untrusted code.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4
        id: filter
        with:
          filters: |
            code:
              - 'Sources/**'
              - 'Tests/**'
              - 'ios/**'
              - 'Package.swift'
              - '.swift-format'
              - 'scripts/add-*.rb'
              - 'scripts/ios-*.sh'
              - 'justfile'
              # Changing how the native job builds must re-run the native job.
              - '.github/workflows/ci.yml'
            android:
              - 'Apps/Android/**'
              - 'Sources/OpenZCineCore/**'
              - 'Sources/OpenZCineAndroidFacade/**'
              - 'Sources/CJNI/**'
              - 'Package.swift'
              - 'Package.resolved'
              - 'scripts/android-*.sh'
              - 'justfile'

  native:
    name: Native Swift/iOS
    needs: changes
    # Skip the slow macOS build for docs-only changes; Meta checks still lint the docs.
    if: ${{ needs.changes.outputs.code == 'true' }}
    # Hosted macOS: free and unlimited on public repositories, and a fresh VM per job. Never move
    # this job to a self-hosted runner — it runs `just native-check` from the pull request, so a
    # fork PR would execute attacker-controlled code on a persistent machine.
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: maxim-lobanov/setup-xcode@ed7a3b1fda3918c0306d1b724322adc0b8cc0a90 # v1
        with:
          xcode-version: latest-stable
      - name: Install native tooling
        run: brew install just swift-format || true
      - name: Run native checks
        run: just native-check

  gate:
    name: CI gate
    # The single required status check. `native` and `android` are conditional, and a required
    # check that never reports leaves a pull request blocked forever — so this job always runs and
    # collapses every other job's result into one verdict. Requiring it is also fail-closed: a pull
    # request that edits this workflow to drop a job stops reporting `CI gate` and cannot merge.
    if: always()
    needs: [meta, secrets, changes, native, android]
    runs-on: ubuntu-latest
    steps:
      - name: Require every job to have passed or been deliberately skipped
        env:
          # success | failure | cancelled | skipped, one per job in `needs`.
          RESULTS: ${{ join(needs.*.result, ' ') }}
        run: |
          set -euo pipefail
          for result in $RESULTS; do
            case "$result" in
              # `skipped` is legitimate: the paths filter proved the job had nothing to do.
              success | skipped) ;;
              *)
                echo "::error::a CI job reported '$result'"
                exit 1
                ;;
            esac
          done
          echo "All CI jobs passed or were skipped: $RESULTS"

  android:
    name: Android
    needs: changes
    # Skip the Gradle build when nothing under Apps/Android changed.
    if: ${{ needs.changes.outputs.android == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          distribution: temurin
          java-version: "21"
      # Gradle caching; the runner's preinstalled Android SDK provides platform/build-tools.
      - uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

      # Swift 6.3.3 plus its matching Android SDK. The action configures the
      # NDK sysroot; Gradle then cross-compiles the arm64-v8a core itself.
      - name: Set up Swift Android toolchain
        id: swift-android
        uses: skiptools/swift-android-action@2044b79660f201ccef8cbce62877e4ec5409f9c8 # v2.9.5
        with:
          swift-version: '6.3.3'
          ndk-version: '27'
          compile-sdk-api-level: '29'
          build-package: false
          build-tests: false
          run-tests: false

      - name: Build, compile UI tests, unit-test, lint, and verify release packages
        working-directory: Apps/Android
        env:
          SWIFT_ANDROID_SDK_ID: swift-6.3.3-RELEASE_android
        run: ./gradlew assembleDebug :app:assembleDebugAndroidTest :wear:assembleDebugAndroidTest test lint :app:verifyReleaseNativeLibraries :wear:verifyWearReleaseArtifact
