name: Plane issue sync

on:
  issues:
    types: [opened, edited, reopened, labeled, unlabeled, closed]

permissions:
  contents: read
  issues: read

concurrency:
  group: plane-issue-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  sync:
    name: Mirror issue state to Plane
    if: ${{ vars.PLANE_SYNC_ENABLED == 'true' }}
    runs-on: ubuntu-latest
    environment: plane-sync
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.repository.default_branch }}
          persist-credentials: false
          sparse-checkout: |
            .github/plane-sync.json
            scripts/plane-sync.mjs
            scripts/plane-sync
      - name: Synchronize trusted issue metadata
        env:
          PLANE_API_KEY: ${{ secrets.PLANE_SYNC_API_KEY }}
        run: node scripts/plane-sync.mjs event --apply
