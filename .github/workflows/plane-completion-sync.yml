name: Plane completion sync

on:
  workflow_run:
    workflows: [CI]
    types: [completed]

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: plane-completion-${{ github.event.workflow_run.head_sha }}
  cancel-in-progress: false

jobs:
  complete:
    name: Complete verified Plane work
    if: >-
      ${{ vars.PLANE_SYNC_ENABLED == 'true' &&
          github.event.workflow_run.conclusion == 'success' &&
          github.event.workflow_run.head_branch == github.event.repository.default_branch &&
          github.event.workflow_run.head_repository.full_name == github.repository }}
    runs-on: ubuntu-latest
    environment: plane-sync
    steps:
      # The successful SHA is on the trusted default branch; no PR artifacts are downloaded.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          persist-credentials: false
          sparse-checkout: |
            .github/plane-sync.json
            scripts/plane-sync.mjs
            scripts/plane-sync
      - name: Mark merged and verified work Done
        env:
          GITHUB_TOKEN: ${{ github.token }}
          PLANE_API_KEY: ${{ secrets.PLANE_SYNC_API_KEY }}
        run: node scripts/plane-sync.mjs complete --apply
