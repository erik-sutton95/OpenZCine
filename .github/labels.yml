# ------------------------------------------------------------------
# Automatic PR labeling (area labels)
# ------------------------------------------------------------------
# We also ship .github/labeler.yml. When the "actions/labeler" workflow
# is enabled, pull requests will automatically receive appropriate
# `area:*` labels based on the files changed.
#
# To enable:
# 1. Add a workflow that uses https://github.com/actions/labeler
#    (or enable GitHub's repository labeler configuration).
# 2. The area labels defined above will be applied automatically.

